<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SOAR logo — animation preview</title>
<style>
  :root{
    --navy:#16294a; --blue:#1d5c9e; --navy-deep:#0f1f3c;
    --light:#eef3f9; --dark:#102139;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f4f6fa; color:var(--navy); padding:40px 24px 80px;
  }
  h1{font-size:22px; font-weight:700; margin:0 0 4px}
  .sub{color:#6b7686; font-size:14px; margin:0 0 32px}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(330px,1fr)); gap:22px; max-width:1100px; margin:0 auto}
  .tile{border-radius:18px; overflow:hidden; box-shadow:0 10px 30px rgba(16,33,57,.10); border:1px solid rgba(16,33,57,.06)}
  .stage{height:200px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden}
  .stage.light{background:linear-gradient(160deg,#ffffff 0%,#e9f0f8 100%)}
  .stage.dark{background:linear-gradient(160deg,#15294a 0%,#0c1a30 100%)}
  .label{padding:12px 16px; font-size:13px; font-weight:600; background:#fff; border-top:1px solid rgba(16,33,57,.06); display:flex; justify-content:space-between; align-items:center}
  .label small{font-weight:500; color:#8a93a1}
  .logo{height:120px; width:auto; display:block}

  /* ---------- 1. GLINT SWEEP (shine travels across the logo shape) ---------- */
  .glint{position:relative}
  .glint img{height:120px; display:block}
  .glint::after{
    content:""; position:absolute; inset:0;
    -webkit-mask-image:var(--logo); mask-image:var(--logo);
    -webkit-mask-size:contain; mask-size:contain;
    -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat;
    -webkit-mask-position:center; mask-position:center;
    background:linear-gradient(105deg,
      transparent 38%,
      var(--shine) 48%, var(--shine-hot) 50%, var(--shine) 52%,
      transparent 62%);
    background-size:280% 100%;
    background-repeat:no-repeat;
    animation:glint 3.6s ease-in-out infinite;
  }
  @keyframes glint{
    0%   {background-position:150% 0}
    35%  {background-position:-60% 0}
    100% {background-position:-60% 0}
  }

  /* ---------- 2. INTRO: rise + fade-in, then one glint ---------- */
  .intro img{height:120px; display:block; animation:rise 4s ease-in-out infinite}
  @keyframes rise{
    0%   {opacity:0; transform:translateY(16px) scale(.985)}
    18%  {opacity:1; transform:translateY(0) scale(1)}
    88%  {opacity:1; transform:translateY(0) scale(1)}
    100% {opacity:0; transform:translateY(-6px) scale(1)}
  }

  /* ---------- 3. SOAR FLOAT (calm continuous lift) ---------- */
  .float img{height:120px; display:block; animation:soar 4.5s ease-in-out infinite}
  @keyframes soar{
    0%,100%{transform:translateY(4px)}
    50%    {transform:translateY(-6px)}
  }

  @media (prefers-reduced-motion: reduce){
    .glint::after,.intro img,.float img{animation:none}
  }
</style>
</head>
<body>
  <h1>SOAR logo — animation options</h1>
  <p class="sub">Live preview on the real logo. Each loops forever. Tell me which one (and which placement) to ship.</p>

  <div class="grid">

    <div class="tile">
      <div class="stage light glint" style="--logo:url(soar-logo-full.png); --shine:rgba(120,170,235,.85); --shine-hot:rgba(210,230,255,.95)">
        <img class="logo" src="soar-logo-full.png" alt="logo" />
      </div>
      <div class="label">1 · Glint sweep <small>header · light</small></div>
    </div>

    <div class="tile">
      <div class="stage dark glint" style="--logo:url(soar-logo-white.png); --shine:rgba(120,190,255,.55); --shine-hot:rgba(225,245,255,.95)">
        <img class="logo" src="soar-logo-white.png" alt="logo" />
      </div>
      <div class="label">1 · Glint sweep <small>footer · dark</small></div>
    </div>

    <div class="tile">
      <div class="stage light intro">
        <img class="logo" src="soar-logo-full.png" alt="logo" />
      </div>
      <div class="label">2 · Rise + fade-in <small>on page load</small></div>
    </div>

    <div class="tile">
      <div class="stage dark float">
        <img class="logo" src="soar-logo-white.png" alt="logo" />
      </div>
      <div class="label">3 · Soar float <small>gentle, continuous</small></div>
    </div>

  </div>
</body>
</html>
