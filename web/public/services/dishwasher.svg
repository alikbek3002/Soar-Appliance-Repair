<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" role="img" aria-label="Dishwasher">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b343c"/>
      <stop offset="1" stop-color="#1c232a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="750" fill="url(#bg)"/>
  <!-- appliance body -->
  <rect x="170" y="120" width="260" height="510" rx="20" fill="none" stroke="#c4cbd1" stroke-width="9"/>
  <!-- control panel -->
  <rect x="170" y="120" width="260" height="70" rx="20" fill="none" stroke="#c4cbd1" stroke-width="9"/>
  <circle cx="220" cy="155" r="8" fill="#c4cbd1"/>
  <circle cx="252" cy="155" r="8" fill="#7d878f"/>
  <rect x="300" y="148" width="90" height="14" rx="7" fill="#7d878f"/>
  <!-- door window -->
  <rect x="205" y="225" width="190" height="330" rx="14" fill="none" stroke="#7d878f" stroke-width="6"/>
  <!-- racks -->
  <line x1="225" y1="305" x2="375" y2="305" stroke="#7d878f" stroke-width="5"/>
  <line x1="225" y1="430" x2="375" y2="430" stroke="#7d878f" stroke-width="5"/>
  <!-- plates -->
  <line x1="245" y1="270" x2="245" y2="300" stroke="#c4cbd1" stroke-width="5" stroke-linecap="round"/>
  <line x1="270" y1="265" x2="270" y2="300" stroke="#c4cbd1" stroke-width="5" stroke-linecap="round"/>
  <line x1="295" y1="265" x2="295" y2="300" stroke="#c4cbd1" stroke-width="5" stroke-linecap="round"/>
  <line x1="320" y1="270" x2="320" y2="300" stroke="#c4cbd1" stroke-width="5" stroke-linecap="round"/>
  <!-- handle -->
  <rect x="245" y="595" width="110" height="12" rx="6" fill="#c4cbd1"/>
</svg>
